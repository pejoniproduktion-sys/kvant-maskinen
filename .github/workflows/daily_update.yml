name: Daglig Portfoljuppdatering

on:
  schedule:
    # Körs måndag till fredag kl 17:00 UTC (vilket blir kl 18:00 eller 19:00 i Sverige beroende på sommar/vintertid)
    - cron: '0 17 * * 1-5'
  workflow_dispatch: # Gör att du även kan starta roboten manuellt inifrån GitHub om du vill testa

jobs:
  update-portfolio:
    runs-on: ubuntu-latest

    steps:
    - name: Check out kod
      uses: actions/checkout@v3

    - name: Installera Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Installera bibliotek
      run: |
        python -m pip install --upgrade pip
        pip install gspread google-auth yfinance pandas

    - name: Kor automatiserings-roboten
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
      run: python automation.py
